services:
  db:
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-example-postgres-password-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-uptimemonitoring}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-uptimemonitoring}"]

  web:
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-example-postgres-password-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-uptimemonitoring}
      APP_URL: ${APP_URL:-http://localhost:3000}
      AUTH_SECRET: ${AUTH_SECRET:-sentrovia-compose-auth-secret-20260708-minimum-32}
      APP_ENCRYPTION_SECRET: ${APP_ENCRYPTION_SECRET:-sentrovia-compose-encryption-secret-20260708-minimum-32}

  worker:
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-example-postgres-password-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-uptimemonitoring}
      APP_URL: ${APP_URL:-http://localhost:3000}
      AUTH_SECRET: ${AUTH_SECRET:-sentrovia-compose-auth-secret-20260708-minimum-32}
      APP_ENCRYPTION_SECRET: ${APP_ENCRYPTION_SECRET:-sentrovia-compose-encryption-secret-20260708-minimum-32}
